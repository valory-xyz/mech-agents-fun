; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are range-form overrides for runtime deps where the package YAML uses
; a range expression — `aea-helpers check-dependencies` does
; string-strict matching so the form must agree on both sides. Plus
; lint-only werkzeug/attrs not in pyproject.
extra_deps =
    protobuf<7,>=5
    web3<8,>=7.0.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    openapi-spec-validator<0.8.0,>=0.7.0
    jsonschema>=4.23.0,<5.0.0
    pyyaml<7.0.0,>=6.0.0
    prometheus_client>=0.23.1,<0.24
    pebble>=5.1,<6
    typing_extensions<=4.15.0,>=3.10.0.2
    werkzeug==3.1.6
    attrs==25.4.0

; Mech tool packages mirror upstream API surfaces (OpenAI/Anthropic-style
; client wrappers, top-level run() entry points with key-rotation
; fallback handlers). The patterns below are pervasive and intentional
; across packages/agents_fun/customs/*:
; - W0718 broad-exception-caught: tool entry points must surface ANY
;   error as part of the (result, ...) return tuple instead of crashing
;   the agent loop; a bare `except Exception` is the correct shape.
; - W0613 unused-argument: tools accept compatibility kwargs (timeout,
;   top_p, n, stop, ...) to match upstream client signatures even when
;   a given backend ignores them.
; - W0102 dangerous-default-value: mutable defaults mirror the
;   OpenAI/Anthropic SDK signatures the wrappers shadow.
extra_pylint_disables = W0718,W0613,W0102

; moviepy attaches fx methods (.volumex, .audio_fadein, ...) at import
; time via decorators, so pylint can't infer them and emits E1101
; no-member. wave.open(filename, "wb") returns a Wave_write but pylint's
; type inference picks the read branch. Both are stdlib/library
; idiomatic usages; ignore the modules wholesale.
extra_pylint_ignored_modules = moviepy,wave

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not
; lint-clean — these come from mech upstream).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.*]
ignore_errors = True

; Third-party libs without type stubs not covered by tomte canonical.
[mypy-replicate.*]
ignore_missing_imports = True

[mypy-moviepy.*]
ignore_missing_imports = True

[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-stability_sdk.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True


[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.19
; Permissive licenses without classifier metadata.
chardet: *
greenlet: *
pillow: *
replicate: *
shellingham: *
faiss-cpu: *
