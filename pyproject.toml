[build-system]
requires = [ "poetry-core>=1.0.0",]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "agents.fun"
version = "0.1.0"
description = ""
authors = [ "8baller <8ball030@gmail.com>", "David Vilela <dvilelaf@gmail.com>", "David Minarsch <david.minarsch@googlemail.com>", "Justice Mace <justice.mace@valory.xyz>", "Ardian Abazi <ardian.abazi@valory.xyz>", "Jose Moreira Sanchez <jose.moreira.sanchez@valory.xyz>", "Adamantios Zaras <adamantios.zaras@valory.xyz>", "Kahan Majmudar <kahan.m.btechi16@ahduni.edu.in>",]
readme = "README.md"
repository = "https://github.com/valory-xyz/agents-fun-mech"
keywords = [ "mech", "tool", "developer", "autonomy", "autonomous", "autonolas", "olas", "service", "multi", "agent",]
classifiers = [ "Environment :: Console", "Environment :: Web Environment", "Development Status :: 2 - Pre-Alpha", "Intended Audience :: Developers", "License :: OSI Approved :: Apache Software License", "Natural Language :: English", "Operating System :: MacOS", "Operating System :: Microsoft", "Operating System :: Unix", "Programming Language :: Python :: 3.10", "Programming Language :: Python :: 3.11", "Programming Language :: Python :: 3.12", "Programming Language :: Python :: 3.13", "Programming Language :: Python :: 3.14", "Topic :: Communications", "Topic :: Internet", "Topic :: Scientific/Engineering", "Topic :: Software Development", "Topic :: System",]
[[tool.poetry.packages]]
include = "packages"

[tool.poetry.dependencies]
python = ">=3.10,<3.15"
open-autonomy = "==0.21.12rc4"
openai = "==1.82.0"
requests = "==2.28.2"
py-multibase = "==1.0.3"
py-multicodec = "==0.2.1"
grpcio = "==1.78.0"
asn1crypto = "<1.5.0,>=1.4.0"
open-aea-ledger-ethereum = "==2.1.0rc6"
open-aea-ledger-cosmos = "*"
protobuf = "<6,>=5"
hypothesis = "==6.21.6"
open-aea-test-autonomy = "==0.21.12rc4"
web3 = "<8,>=7.0.0"
ipfshttpclient = "==0.8.0a2"
open-aea-cli-ipfs = "==2.1.0rc6"
pytest-asyncio = "*"
aiohttp = "<4.0.0,>=3.8.5"
certifi = "*"
multidict = "*"
ecdsa = ">=0.15"
eth_typing = "*"
hexbytes = "*"
packaging = "*"
py-ecc = "==8.0.0"
pytz = "==2022.2.1"
typing_extensions = "<=4.15.0,>=3.10.0.2"
websocket_client = "<1,>=0.32.0"
toml = "==0.10.2"
eth-abi = "==5.2.0"
pytest = "==8.4.2"
eth-utils = "==5.3.0"
pycryptodome = "==3.20.0"
openapi-core = "==0.22.0"
openapi-spec-validator = "<0.8.0,>=0.7.0"
jsonschema = ">=4.23.0,<5.0.0"
replicate = "==0.28.0"
moviepy = "==1.0.3"
anthropic = "==0.21.3"
google-api-python-client = "==2.130.0"
tiktoken = "==0.7.0"
httpx = "==0.28.1"
google-genai = "==1.17.0"
pillow = "==11.2.1"
multiaddr = "==0.0.9"
prometheus-client = "^0.23.1"
pebble = "==5.1.3"
py-eth-sig-utils = "*"
PyYAML = "==6.0.1"
prometheus_client = "==0.23.1"
pyyaml = "<7.0.0,>=6.0.0"
werkzeug = "*"
attrs = "*"

[tool.poetry.group.dev.dependencies]
setuptools = "^78.0.1"

[tool.poetry.group.dev.dependencies.tomte]
version = "==0.6.1"
extras = [ "cli", "tests",]
