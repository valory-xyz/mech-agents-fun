    "web3<8,>=7.0.0",
    "ipfshttpclient==0.8.0a2",
    "open-aea-cli-ipfs==2.2.1",
    "pytest-asyncio",
    "aiohttp<4.0.0,>=3.8.5",
    "certifi",
